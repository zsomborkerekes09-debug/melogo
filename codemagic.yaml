workflows:
  ios-app-store:
    name: iOS App Store Build
    environment:
      xcode: latest
      cocoapods: default
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Add iOS platform if missing
        script: npx cap add ios || true
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build iOS App
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release archive -archivePath $PWD/build/App.xcarchive
      # Note: Automatic code signing requires setting up certificates in Codemagic UI
    artifacts:
      - ios/App/build/App.xcarchive
      - ios/App/build/*.ipa
